name: Bug report
description: Report a problem with the npm package or the PHP package.
title: "[bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. For **data** problems (a wrong name or a missing
        district) please use the "Data fix" template instead.
  - type: dropdown
    id: area
    attributes:
      label: Which part is affected?
      options:
        - npm package (saudi-municipal-coding)
        - PHP package (yasseralsamman/saudi-municipal-coding)
        - Build / data pipeline
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package / commit version
      placeholder: "e.g. 1.0.0, or a commit SHA"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: What actually happened?
      description: Include the exact error message and a stack trace if you have one.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: A minimal code snippet or sequence of actions.
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: "e.g. Node 20.11 / PHP 8.2"
    validations:
      required: false
